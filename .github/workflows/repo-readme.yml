name: Repo README

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'
      - 'data/**'
      - 'templates/repo_readme.md.j2'
  workflow_dispatch:

concurrency:
  group: repo-readme
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: 'scripts/gen_repo_readme.py'

      - name: Regenerate docs/README.md
        run: uv run scripts/gen_repo_readme.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/README.md; then
            echo "Sin cambios; no se commitea."
            exit 0
          fi
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/README.md
          git commit -m "docs: regenerar inventario del repo [skip ci]"
          git push
