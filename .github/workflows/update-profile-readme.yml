name: Update Profile README

on:
  schedule:
    # Lunes 03:00 UTC (semanal). El script no commitea si no hay cambios reales.
    - cron: '0 3 * * 1'
  workflow_dispatch:
  repository_dispatch:
    types: [subject-repo-updated]

concurrency:
  group: update-profile-readme
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: 'scripts/sync_readme.py'

      - name: Regenerate README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run scripts/sync_readme.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- profile/README.md; then
            echo "Sin cambios reales; no se commitea."
            exit 0
          fi
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add profile/README.md
          git commit -m "docs: actualizar README del perfil [skip ci]"
          git push
