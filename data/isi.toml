# Manifiesto de la carrera Ingeniería en Sistemas de Información (ISI)
#
# Universidad Tecnológica Nacional — Facultad Regional Resistencia (UTN-FRRE).
# Single source of truth para scripts de scaffolding (init_repo.py, sync_repos.py)
# y como referencia legible del plan curricular completo.
#
# Fuentes (ver data/sources/):
#   - dc2008.pdf  — Ordenanza Nº 1150/07, Plan 2008.
#   - dcisi.pdf   — Ordenanza Nº 1877/22, Plan 2023.
#   - corre.pdf   — DAG de correlatividades específico de FRRE (pendiente).
#
# Convenciones:
#   - Slugs en kebab-case, ASCII, todo minúsculas.
#   - Numerales romanos en minúsculas (-i, -ii).
#   - Las correlativas se referencian por slug, no por orden, para que el grafo
#     sobreviva renumeraciones entre planes.
#   - Niveles 1..5 corresponden a "Primer Nivel" .. "Quinto Nivel".
#   - hs-semanales: horas cátedra semanales (dictado anual).
#   - hs-totales: horas reloj totales en el año.
#   - rtf: Reserva de Tareas para la Formación práctica (horas).

# ============================================================================
# Carrera
# ============================================================================

[carrera]
codigo = "isi"
nombre = "Ingeniería en Sistemas de Información"
universidad = "Universidad Tecnológica Nacional"
facultad = "Facultad Regional Resistencia"
facultad-codigo = "frre"
duracion-anios = 5
titulo = "Ingeniero/a en Sistemas de Información"

